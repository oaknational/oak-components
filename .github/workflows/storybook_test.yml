name: Storybook Test

on: deployment_status

permissions:
  contents: read

jobs:
  storybook-tests:
    if: github.event.deployment_status.state == 'success'
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb
        with:
          cache: true

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - run: pnpm install --verbose

      - name: Get Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION="$(node -p "require('./node_modules/playwright/package.json').version")"
          echo "version=${PLAYWRIGHT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Run Storybook tests
        run: pnpm exec test-storybook --url "${{ github.event.deployment_status.target_url }}" --no-index-json
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
