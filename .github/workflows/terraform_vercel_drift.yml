name: Terraform Drift Detection

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Drift Detection
        uses: oaknational/oak-terraform-actions/actions/terraform-vercel-drift@42682cc06818ab142a4c8667643a44f68ae07e62
        with:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
          TF_WORKSPACE: ${{ vars.TF_WORKSPACE }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          VERCEL_DRIFT_SLACK_CHANNEL_ID: ${{ secrets.VERCEL_DRIFT_SLACK_CHANNEL_ID }}